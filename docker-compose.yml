# docker-compose.yml — รัน อบต.หัวงัว citizen-help บน local ผ่าน Docker
# ใช้: docker compose up --build   → http://localhost:3000
# หยุด: docker compose down
#
# Architecture: app container + plain Postgres + Redis ทั้งหมดใน compose network เดียวกัน
# (ก่อนหน้านี้ใช้ Supabase local stack รันแยก แต่ย้ายออกแล้วเพราะใช้แค่ Postgres อย่างเดียว).
# DATABASE_URL ชี้ไป service `postgres:5432` ใน compose network โดยตรง (ไม่ต้อง host.docker.internal).
#
# Rate limiting: up-redis (REST proxy) แปลง @upstash/redis REST API → Redis RESP.
# เลือกแทน redis stack/valkey เพราะ @upstash/redis SDK ใช้ REST (env UPSTASH_REDIS_REST_URL
# + UPSTASH_REDIS_REST_TOKEN) ไม่ใช่ RESP ตรงๆ. host mode (pnpm dev) เข้า localhost:8080;
# container mode เข้าผ่าน service name up-redis:8080 (override ใน app environment ด้านล่าง).
#
# ขั้นตอน local ฉบับเต็ม:
#   1. docker compose up -d postgres redis up-redis  (ยก Postgres + Redis stack)
#   2. pnpm db:push            (สร้าง schema — รันบน host)
#   3. pnpm db:seed            (ใส่ข้อมูลเริ่มต้น — รันบน host)
#   4. pnpm dev                (รัน Next.js dev server บน host)
#      หรือ docker compose up --build  (รันทุกอย่างใน container รวม app)
#
# env: สำหรับ M0 (foundation) หน้า hero render ได้โดยไม่ต้องมี secret.
# เมื่อใช้ API จริง (categories/cases) ต้องสร้าง .env.local จาก .env.local.example.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: huangua-citizen-help:local
    container_name: huangua-app
    ports:
      - '3000:3000'
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
      # DATABASE_URL ชี้ไป service `postgres` ใน compose network (override .env.local ที่ใช้ localhost)
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres
      # container mode: ชี้ไป up-redis ใน compose network (override .env.local ที่ใช้ localhost)
      UPSTASH_REDIS_REST_URL: http://up-redis:8080
    depends_on:
      postgres:
        condition: service_healthy
      up-redis:
        condition: service_healthy

  # PostgreSQL 17 — ฐานข้อมูลหลักของแอป (ใช้แทน Supabase stack ทั้งก้อน)
  # volume `postgres-data` เก็บข้อมูลถาวร รัน `docker compose down` แล้วข้อมูลยังอยู่
  # รัน `docker compose down -v` เท่านั้นที่ล้าง volume นี้ (จะเสียข้อมูลทั้งหมด)
  postgres:
    image: postgres:17-alpine
    container_name: huangua-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  # Redis backend — เก็บข้อมูล rate-limit ภายใน compose network (ไม่ expose ออก host)
  redis:
    image: redis:8-alpine
    restart: unless-stopped

  # up-redis — REST proxy drop-in สำหรับ @upstash/redis SDK (มี built-in healthcheck)
  up-redis:
    image: ghcr.io/coriou/up-redis:latest
    restart: unless-stopped
    ports:
      # host port configurable: ตั้ง UPREDIS_HOST_PORT ใน .env (compose interpolation)
      # หรือ shell env หากเครื่องมี process อื่นจอง 8080 อยู่ก่อน (เช่น TokenAgent.exe).
      # default 8080 สำหรับเครื่องทั่วไป — container port ยังเป็น 8080 เสมอ.
      - '${UPREDIS_HOST_PORT:-8080}:8080'
    environment:
      # Bearer token auth — reuse ค่าเดียวกับ UPSTASH_REDIS_REST_TOKEN ของ app
      # default fallback ใช้เมื่อผู้ใช้ยังไม่ตั้ง UPSTASH_REDIS_REST_TOKEN ใน .env.local
      UPREDIS_TOKEN: ${UPSTASH_REDIS_REST_TOKEN:-local-dev-token-0123456789}
      UPREDIS_REDIS_URL: redis://redis:6379
    depends_on:
      - redis

volumes:
  postgres-data: